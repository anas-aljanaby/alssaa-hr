<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>شبكة الساعة — غير متصل</title>
    <meta name="theme-color" content="#155dfc" />
    <link rel="icon" href="/pwa/icon-192.png" type="image/png" />
    <style>
      html, body { margin: 0; padding: 0; height: 100%; background: #f8fafc; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Kufi Arabic", "Segoe UI Arabic", Tahoma, Arial, sans-serif;
        color: #0f172a;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        box-sizing: border-box;
        -webkit-font-smoothing: antialiased;
      }
      .card {
        width: 100%;
        max-width: 360px;
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 24px;
        padding: 28px 24px;
        box-shadow: 0 12px 40px rgba(15, 23, 42, 0.06);
        text-align: center;
      }
      .logo {
        width: 72px;
        height: 72px;
        margin: 0 auto 16px;
        border-radius: 20px;
        background: #ffffff url("/pwa/icon-192.png") center/60px 60px no-repeat;
        box-shadow: 0 8px 24px rgba(21, 93, 252, 0.12);
      }
      h1 {
        font-size: 18px;
        font-weight: 700;
        margin: 0 0 8px;
        color: #0f172a;
      }
      p {
        font-size: 14px;
        line-height: 1.6;
        color: #475569;
        margin: 0 0 20px;
      }
      button {
        appearance: none;
        border: none;
        background: #155dfc;
        color: #ffffff;
        font-size: 14px;
        font-weight: 600;
        padding: 12px 20px;
        border-radius: 12px;
        cursor: pointer;
        width: 100%;
      }
      button:active { background: #1348c7; }
      .hint {
        font-size: 12px;
        color: #94a3b8;
        margin-top: 14px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="logo" aria-hidden="true"></div>
      <h1>لا يوجد اتصال بالإنترنت</h1>
      <p>
        تعذر الوصول إلى التطبيق. تحقق من اتصالك بالإنترنت ثم حاول إعادة التحميل.
      </p>
      <button type="button" onclick="window.location.reload()">إعادة المحاولة</button>
      <p class="hint">شبكة الساعة | الموارد البشرية</p>
    </main>
  </body>
</html>
