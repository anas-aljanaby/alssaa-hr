<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&family=Almarai:wght@300;400;700;800&display=swap"
    />
    <link rel="icon" href="/pwa/icon-192.png" type="image/png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/pwa/apple-touch-icon.png" />
    <meta name="theme-color" content="#155dfc" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="&#x2067;شبكة الساعة&#x2069;" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>&#x2067;شبكة الساعة | الموارد البشرية&#x2069;</title>
    <style>
      /* Inline boot splash — visible before React mounts and before any CSS bundle loads. */
      html, body { margin: 0; padding: 0; background: #f8fafc; }
      body {
        font-family: "Cairo", "Almarai", "Segoe UI", "Segoe UI Arabic", Tahoma, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      #root:empty::before {
        content: "";
        position: fixed;
        inset: 0;
        display: block;
        background: #f8fafc;
      }
      .app-boot-splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        background: #f8fafc;
        color: #0f172a;
        z-index: 1;
      }
      .app-boot-splash__logo {
        width: 88px;
        height: 88px;
        border-radius: 24px;
        box-shadow: 0 12px 40px rgba(21, 93, 252, 0.18);
        background-color: #ffffff;
        background-image: url("/pwa/icon-192.png");
        background-size: 72px 72px;
        background-repeat: no-repeat;
        background-position: center;
      }
      .app-boot-splash__title {
        font-size: 16px;
        font-weight: 600;
        color: #0f172a;
      }
      .app-boot-splash__hint {
        font-size: 13px;
        color: #64748b;
      }
      .app-boot-splash__spinner {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 3px solid rgba(21, 93, 252, 0.15);
        border-top-color: #155dfc;
        animation: app-boot-spin 0.9s linear infinite;
      }
      @keyframes app-boot-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="app-boot-splash" role="status" aria-live="polite">
        <div class="app-boot-splash__logo" aria-hidden="true"></div>
        <div class="app-boot-splash__title">شبكة الساعة</div>
        <div class="app-boot-splash__spinner" aria-hidden="true"></div>
        <div class="app-boot-splash__hint">جارٍ التحميل…</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
